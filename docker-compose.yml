services:
  web:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - .env.development
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             exec python manage.py runserver 0.0.0.0:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monorepo
      POSTGRES_USER: monorepo
      POSTGRES_PASSWORD: monorepo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monorepo -d monorepo"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
