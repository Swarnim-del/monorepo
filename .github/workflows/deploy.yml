name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - production

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'master' && 'dev' || 'production' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up Environment Variables
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "SERVER_HOST=${{ secrets.DEV_HOST }}" >> $GITHUB_ENV
            echo "SERVER_USER=${{ secrets.DEV_USER }}" >> $GITHUB_ENV
            echo "SSH_PRIVATE_KEY=${{ secrets.DEV_SSH_KEY }}" >> $GITHUB_ENV
            echo "DEPLOY_PATH=${{ secrets.DEV_DEPLOY_PATH }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "production" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "SERVER_HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
            echo "SERVER_USER=${{ secrets.PROD_USER }}" >> $GITHUB_ENV
            echo "SSH_PRIVATE_KEY=${{ secrets.PROD_SSH_KEY }}" >> $GITHUB_ENV
            echo "DEPLOY_PATH=${{ secrets.PROD_DEPLOY_PATH }}" >> $GITHUB_ENV
          fi

      - name: Deploy to Server via SSH
        run: |
          # Create ssh directory and add private key
          mkdir -p ~/.ssh
          echo "${{ env.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add target host to known hosts
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
          
          # Run remote deployment command to pull, build, and restart
          ssh -i ~/.ssh/id_rsa ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            docker compose build
            docker compose up -d
          "
          