name: Deploy to production

on:
  push:
    branches:
      - production

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monorepo
          POSTGRES_USER: monorepo
          POSTGRES_PASSWORD: monorepo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: development
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: monorepo
      POSTGRES_USER: monorepo
      POSTGRES_PASSWORD: monorepo
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          uv sync

      - name: Run Django Tests
        run: |
          uv run src/manage.py test src/chat

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        run: |
          # Create ssh directory and add private key
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add target host to known hosts
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
          
          # Run remote deployment command to pull, build, and restart
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            git fetch origin
            git checkout production
            git pull origin production
            docker compose build
            docker compose up -d
          "
